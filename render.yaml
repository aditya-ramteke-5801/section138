services:
  - type: web
    name: legal-case-picker-api
    runtime: node
    rootDir: server
    buildCommand: PUPPETEER_CACHE_DIR=/opt/render/project/src/server/.cache/puppeteer npm install
    startCommand: PUPPETEER_CACHE_DIR=/opt/render/project/src/server/.cache/puppeteer node --max-old-space-size=450 index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/server/.cache/puppeteer

services:
  - type: web
    name: legal-case-picker-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node --max-old-space-size=450 index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
